<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 660" font-family="'Source Serif 4', Georgia, serif">
<defs>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&amp;family=Source+Serif+4:wght@400;600&amp;family=DM+Mono:wght@400&amp;display=swap');
.aw-ttl{font-family:'Playfair Display',serif;font-weight:700;fill:#1a5276;}
.aw-sub{font-family:'DM Mono',monospace;fill:#8a8a8a;letter-spacing:.12em;}
.aw-ring{font-family:'DM Mono',monospace;letter-spacing:.18em;}
.aw-lname{font-family:'Playfair Display',serif;font-weight:700;}
.aw-litem{font-family:'Source Serif 4',serif;fill:#3a3a3a;}
.aw-dir{font-family:'DM Mono',monospace;letter-spacing:.08em;}
.aw-merk{font-family:'Playfair Display',serif;font-style:italic;fill:#ffffff;}
</style>
<marker id="ah-blue" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1a5276"/></marker>
<marker id="ah-red" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#c0392b"/></marker>
</defs>
<rect width="840" height="660" fill="#fbf9f5"/>
<text x="48" y="62" class="aw-ttl" font-size="34">The Awareness Model</text>
<text x="50" y="88" class="aw-sub" font-size="13">GUE BASIS · THREE LAYERS</text>
<line x1="48" y1="104" x2="792" y2="104" stroke="#e0d8cc" stroke-width="1"/>
<circle cx="250" cy="330" r="190" fill="#eaf3f9" stroke="#1a5276" stroke-width="1.5"/>
<circle cx="250" cy="330" r="128" fill="#bcdcef" stroke="#1a5276" stroke-width="1.5"/>
<circle cx="250" cy="330" r="66" fill="#1a5276"/>
<text x="250" y="335" text-anchor="middle" class="aw-ring" fill="#ffffff" font-size="15">SELF</text>
<text x="250" y="232" text-anchor="middle" class="aw-ring" fill="#1a5276" font-size="14">TEAM</text>
<text x="250" y="166" text-anchor="middle" class="aw-ring" fill="#1a5276" font-size="13">ENVIRONMENT</text>
<line x1="262" y1="544" x2="300" y2="544" stroke="#1a5276" stroke-width="1.6" marker-end="url(#ah-blue)"/>
<text x="308" y="548" class="aw-dir" fill="#1a5276" font-size="12">Built: inside &#8594; out</text>
<line x1="300" y1="570" x2="262" y2="570" stroke="#c0392b" stroke-width="1.6" marker-end="url(#ah-red)"/>
<text x="308" y="574" class="aw-dir" fill="#c0392b" font-size="12">Lost: outside &#8594; in</text>
<rect x="500" y="150" width="20" height="20" fill="#1a5276"/>
<text x="532" y="165" class="aw-lname" fill="#1a5276" font-size="18">Self-Awareness</text>
<text x="532" y="187" class="aw-litem" font-size="14">Gas · Depth · Time · Deco · Trim</text>
<text x="532" y="208" class="aw-litem" font-size="14">Battery &amp; Trigger time · CO2</text>
<rect x="500" y="270" width="20" height="20" fill="#bcdcef" stroke="#1a5276" stroke-width="1"/>
<text x="532" y="285" class="aw-lname" fill="#1a5276" font-size="18">Team Awareness</text>
<text x="532" y="307" class="aw-litem" font-size="14">Position · Status · Signals</text>
<text x="532" y="328" class="aw-litem" font-size="14">Match speed · Keep distance</text>
<rect x="500" y="390" width="20" height="20" fill="#eaf3f9" stroke="#1a5276" stroke-width="1"/>
<text x="532" y="405" class="aw-lname" fill="#1a5276" font-size="18">Environment Awareness</text>
<text x="532" y="427" class="aw-litem" font-size="14">Exit · Topography · Line</text>
<text x="532" y="448" class="aw-litem" font-size="14">Current · Way out without the DPV</text>
<rect x="0" y="596" width="840" height="64" fill="#1a5276"/>
<text x="420" y="637" text-anchor="middle" class="aw-merk" font-size="24">Built from the inside &#8211; lost from the outside.</text>
</svg>
